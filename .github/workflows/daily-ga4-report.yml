name: Daily Analytics Report

on:
  schedule:
    - cron: "0 0 * * *" # UTC 0:00 = JST 9:00
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts/ga4
        run: npm ci

      - name: Write service account credentials
        run: echo "${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}" | base64 -d > /tmp/service-account.json

      - name: Run daily report
        working-directory: scripts/ga4
        run: npx tsx daily-report.ts
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}

      - name: Notify Slack on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"🚨 saharasabaka デイリーレポート 失敗\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|ログを確認>\"}"
          fi
